<!DOCTYPE html>
<html>
<head><title>Gemini WS Test</title>
<style>
body{font-family:monospace;background:#111;color:#eee;padding:20px;max-width:900px;}
input{background:#222;color:#eee;border:1px solid #555;padding:8px;width:420px;font-size:14px;}
button{background:#7c3aed;color:#fff;border:none;padding:9px 18px;cursor:pointer;margin-left:8px;border-radius:6px;font-size:14px;}
button:hover{background:#a855f7;}
#log{margin-top:20px;white-space:pre-wrap;font-size:13px;line-height:1.7;}
.err{color:#f77;} .ok{color:#4f4;} .info{color:#ff0;} .dim{color:#888;}
</style>
</head>
<body>
<h2>🔬 Gemini Live API — Model Finder</h2>
<div>
  <input id="key" type="text" placeholder="Paste Gemini API key (AIzaSy...)">
  <button onclick="listModels()">1. List Models</button>
  <button onclick="testAll()">2. Test Live Models</button>
  <button onclick="testGenerateContent()">3. Test generateContent</button>
</div>
<div id="log"></div>
<script>
const BASE_URL = 'wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent';

function log(msg, cls='info') {
  const d = document.getElementById('log');
  const t = new Date().toISOString().slice(11,23);
  d.innerHTML += `<span class="${cls}">[${t}] ${msg}\n</span>`;
  d.scrollTop = d.scrollHeight;
}

// Step 1: List all models from REST API
async function listModels() {
  const key = document.getElementById('key').value.trim();
  if (!key) { log('Enter API key first!', 'err'); return; }
  document.getElementById('log').innerHTML = '';
  log('Fetching model list from REST API...', 'info');

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
    const data = await res.json();
    if (!res.ok) { log('API error: ' + JSON.stringify(data), 'err'); return; }

    const models = data.models || [];
    log(`Found ${models.length} total models. Filtering for "live" support...\n`, 'dim');

    const liveModels = models.filter(m =>
      (m.name || '').toLowerCase().includes('live') ||
      (m.supportedGenerationMethods || []).includes('bidiGenerateContent')
    );

    if (liveModels.length === 0) {
      log('No "live" models found. Showing all models with bidiGenerateContent support:', 'info');
      models.forEach(m => {
        const methods = (m.supportedGenerationMethods || []).join(', ');
        log(`  ${m.name}  [${methods}]`, 'dim');
      });
    } else {
      log('✅ Models supporting Live / bidiGenerateContent:', 'ok');
      liveModels.forEach(m => {
        const methods = (m.supportedGenerationMethods || []).join(', ');
        log(`  ✅ ${m.name}`, 'ok');
        log(`     methods: ${methods}`, 'dim');
      });
    }
  } catch(e) {
    log('Fetch error: ' + e.message, 'err');
  }
}

// Step 2: Test specific models via WebSocket
function testModel(key, model) {
  return new Promise(resolve => {
    const ws = new WebSocket(`${BASE_URL}?key=${key}`);
    const timer = setTimeout(() => { try{ws.close();}catch{} resolve({model, result:'⏰ timeout'}); }, 6000);

    ws.onopen = () => {
      ws.send(JSON.stringify({
        setup: { model, generation_config: { response_modalities: ['AUDIO'] } }
      }));
    };
    ws.onmessage = (e) => {
      clearTimeout(timer);
      try {
        const msg = JSON.parse(e.data);
        if (msg.setupComplete) { ws.close(); resolve({model, result:'✅ WORKS!'}); }
        else resolve({model, result:'✅ open, msg: ' + e.data.slice(0,100)});
      } catch { resolve({model, result:'parse error'}); }
    };
    ws.onerror = () => { clearTimeout(timer); };
    ws.onclose = (e) => {
      clearTimeout(timer);
      if (e.code === 1008) resolve({model, result:`❌ 1008 — ${e.reason}`});
      else if (e.code === 1006) resolve({model, result:'❌ 1006 — refused'});
      else resolve({model, result:`close code ${e.code}: ${e.reason}`});
    };
  });
}

async function testAll() {
  const key = document.getElementById('key').value.trim();
  if (!key) { log('Enter API key first!', 'err'); return; }
  document.getElementById('log').innerHTML = '';

  // Get models from API first, then test any with "live" in name
  log('Fetching models to test...', 'info');
  let toTest = [];
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
    const data = await res.json();
    const models = data.models || [];
    toTest = models
      .filter(m => (m.name||'').toLowerCase().includes('live') || (m.supportedGenerationMethods||[]).includes('bidiGenerateContent'))
      .map(m => m.name);
    log(`Found ${toTest.length} live-capable models to test.\n`, 'dim');
  } catch(e) {
    log('Could not list models, using defaults...', 'err');
    toTest = [
      'models/gemini-2.5-flash-preview-native-audio-dialog',
      'models/gemini-live-2.5-flash-native-audio',
      'models/gemini-2.0-flash-live-001',
    ];
  }

  if (toTest.length === 0) {
    log('No live models found for this API key!', 'err');
    return;
  }

  for (const model of toTest) {
    log(`Testing: ${model}`, 'info');
    const {result} = await testModel(key, model);
    const cls = result.startsWith('✅') ? 'ok' : 'err';
    log(`Result:  ${result}\n`, cls);
    if (result.startsWith('✅ WORKS')) {
      log('🎉 USE THIS MODEL IN YOUR APP!', 'ok');
      log(`Model name: ${model}`, 'ok');
    }
  }
  log('Done.', 'dim');
}

async function testGenerateContent() {
  const key = document.getElementById('key').value.trim();
  if (!key) { log('Enter API key first!', 'err'); return; }
  document.getElementById('log').innerHTML = '';
  log('Fetching all models and testing generateContent support...', 'info');

  let models = [];
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
    const data = await res.json();
    if (!res.ok) { log('API error: ' + JSON.stringify(data), 'err'); return; }
    models = (data.models || []).filter(m => (m.supportedGenerationMethods || []).includes('generateContent'));
    log(`Found ${models.length} models supporting generateContent:\n`, 'dim');
    models.forEach(m => log(`  ${m.name}`, 'dim'));
    log('', 'dim');
  } catch(e) {
    log('Fetch error: ' + e.message, 'err'); return;
  }

  if (models.length === 0) { log('No generateContent models found!', 'err'); return; }

  // Test each model with a simple prompt
  for (const m of models) {
    const modelId = m.name; // e.g. "models/gemini-1.5-flash"
    log(`Testing ${modelId}...`, 'info');
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/${modelId}:generateContent?key=${key}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: 'Say hi in one word.' }] }] })
        }
      );
      const data = await res.json();
      if (res.ok) {
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '(no text)';
        log(`  ✅ WORKS — reply: "${reply.slice(0,60)}"`, 'ok');
        log(`  👉 Use this model: "${modelId}"`, 'ok');
      } else {
        log(`  ❌ ${res.status}: ${JSON.stringify(data).slice(0,120)}`, 'err');
      }
    } catch(e) {
      log(`  ❌ Error: ${e.message}`, 'err');
    }
  }
  log('\nDone.', 'dim');
}
</script>
</body>
</html>
